<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <header class="header bg-primary text-white text-center py-4 mb-4">
        <h1><i class="bi bi-wallet2"></i> Controle de Gastos</h1>
    </header>

    <main class="container">
        <!-- Dashboard Section -->
        <section class="dashboard mb-5" aria-label="Resumo Financeiro">
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card card-custom text-center shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title text-muted">Receitas</h5>
                            <h2 class="text-success" id="total-income">R$ 0,00</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-custom text-center shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title text-muted">Despesas</h5>
                            <h2 class="text-danger" id="total-expense">R$ 0,00</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card card-custom text-center shadow-sm bg-gradient-primary text-white" id="total-balance-card">
                        <div class="card-body">
                            <h5 class="card-title text-white-50">Saldo Atual</h5>
                            <h2 id="total-balance">R$ 0,00</h2>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="row">
            <!-- Form Section -->
            <section class="col-lg-4 mb-4" aria-label="Nova Transação">
                <div class="card card-custom shadow-sm h-100">
                    <div class="card-body">
                        <h4 class="card-title mb-4">Nova Transação</h4>
                        <form id="transaction-form">
                            <div class="mb-3">
                                <label for="desc" class="form-label">Descrição</label>
                                <input type="text" class="form-control" id="desc" placeholder="Ex: Salário, Aluguel" required>
                            </div>
                            <div class="mb-3">
                                <label for="amount" class="form-label">Valor (R$)</label>
                                <input type="number" step="0.01" class="form-control" id="amount" placeholder="0.00" required>
                            </div>
                            <div class="mb-4">
                                <label for="type" class="form-label">Tipo</label>
                                <select class="form-select" id="type" required>
                                    <option value="" disabled selected>Selecione...</option>
                                    <option value="income">Receita</option>
                                    <option value="expense">Despesa</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-custom">Adicionar</button>
                        </form>
                    </div>
                </div>
            </section>

            <!-- List Section -->
            <section class="col-lg-8" aria-label="Histórico de Transações">
                <div class="card card-custom shadow-sm h-100">
                    <div class="card-body">
                        <h4 class="card-title mb-4">Histórico</h4>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Descrição</th>
                                        <th>Valor</th>
                                        <th>Tipo</th>
                                        <th class="text-end">Ação</th>
                                    </tr>
                                </thead>
                                <tbody id="transaction-list">
                                    <!-- Dynamic rows via JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="text-center text-muted py-4 mt-5">
        <p>&copy; 2026 Controle de Gastos. Todos os direitos reservados.</p>
    </footer>

    <!-- Custom JS -->
    <script src="./js/app.js"></script>
</body>
</html>
